name: Update Values
on:
  schedule:
    - cron: '0 * * * *'  # каждый час
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch values
        run: |
          curl -sL "https://api.jailbreakchangelogs.xyz/items/list" > values.json
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add values.json
          git diff --staged --quiet || git commit -m "Update values"
          git push
